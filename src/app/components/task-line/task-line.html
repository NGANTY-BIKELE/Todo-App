<div class=" grid grid-cols-[150px_1fr_160px_180px_120px] items-center px-6 py-4 bg-white border border-slate-200 rounded shadow-sm hover:shadow-md transition-all">

  <span class="text-xs text-slate-900">#task {{ task.id }}</span>

  <span class="text-sm text-slate-700 font-medium truncate pr-4 pl-4">{{ task.title }}</span>

  <span class="text-[10px] font-bold px-2 py-1 w-fit rounded" [ngStyle]="priorityStyle">
    {{ task.priority }}
  </span>

  <span class="text-[10px] font-bold px-2 py-1 w-fit rounded" [ngStyle]="statusStyle">
    {{ task.status }}
  </span>

  <div class="flex items-center gap-4">
    <button class="text-slate-900 hover:text-slate-700 transition-colors" title="Edit">
      <svg lucideSquarePen [size]="16"></svg>
    </button>
    <button class="text-slate-900 hover:text-red-500 transition-colors" title="Delete">
      <svg lucideTrash [size]="16"></svg>
    </button>
  </div>

</div>
