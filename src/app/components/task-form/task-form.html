<div class="max-w-2xl mx-auto p-8 bg-white/80 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-100">
  <!-- Header -->
  <div class="mb-8">
    <h2 class="text-3xl font-bold text-slate-800 tracking-tight">Create New Task</h2>
    <p class="text-slate-500 mt-2">Fill in the details below to organize your day.</p>
  </div>

  <form class="space-y-6">
    <!-- Task Title -->
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">Task Title</label>
      <input type="text" placeholder="e.g. Design Dashboard" 
        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all outline-none bg-slate-50/50">
    </div>

    <!-- Description -->
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">Description</label>
      <textarea rows="3" placeholder="Describe the task details..." 
        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all outline-none bg-slate-50/50"></textarea>
    </div>

    <!-- Priority & Status (Side by Side) -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Priority</label>
        <select class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all outline-none bg-slate-50/50 appearance-none cursor-pointer">
          <option value="high">🔥 High</option>
          <option value="medium">⚡ Medium</option>
          <option value="low">☁️ Low</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Status</label>
        <select class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all outline-none bg-slate-50/50 appearance-none cursor-pointer">
          <option value="todo">📋 To Do</option>
          <option value="inprogress">⏳ In Progress</option>
          <option value="done">✅ Done</option>
        </select>
      </div>
    </div>

    <!-- Dates (Side by Side) -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Date Start</label>
        <input type="date" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all outline-none bg-slate-50/50">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Date End</label>
        <input type="date" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all outline-none bg-slate-50/50">
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex items-center justify-end space-x-4 pt-6 border-t border-slate-100">
      <button type="button" 
        class="px-6 py-3 rounded-xl text-slate-600 font-semibold hover:bg-slate-100 transition-colors">
        Cancel
      </button>
      <button type="submit" 
        class="px-8 py-3 rounded-xl bg-indigo-600 text-white font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">
        Create Task
      </button>
    </div>
  </form>
</div>
