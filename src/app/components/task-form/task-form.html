<div class="max-w-xl mx-auto py-8">
  <div class="border border-slate-200 rounded-2xl p-6 bg-white">
    <h2 class="text-xl font-medium text-slate-800 mb-1">New task</h2>
    <p class="text-sm text-slate-400 mb-6">Fill in the details to organize your day.</p>

    <form class="space-y-5">
      <!-- Title -->
      <div>
        <label class="block text-xs text-slate-500 mb-1.5">Title</label>
        <input type="text" placeholder="e.g. Design dashboard"
          class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white text-slate-800 outline-none focus:border-slate-400 transition-colors" />
      </div>

      <!-- Description -->
      <div>
        <label class="block text-xs text-slate-500 mb-1.5">Description</label>
        <textarea rows="3" placeholder="What needs to be done?"
          class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white text-slate-800 outline-none focus:border-slate-400 transition-colors resize-none leading-relaxed"></textarea>
      </div>

      <!-- Priority & Status -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">Priority</label>
          <select class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white text-slate-800 outline-none focus:border-slate-400 transition-colors cursor-pointer">
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">Status</label>
          <select class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white text-slate-800 outline-none focus:border-slate-400 transition-colors cursor-pointer">
            <option>To do</option>
            <option>In progress</option>
            <option>Done</option>
          </select>
        </div>
      </div>

      <!-- Dates -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">Start date</label>
          <input type="date"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white text-slate-800 outline-none focus:border-slate-400 transition-colors" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">End date</label>
          <input type="date"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white text-slate-800 outline-none focus:border-slate-400 transition-colors" />
        </div>
      </div>

      <!-- Actions -->
      <div class="flex justify-end gap-2 pt-2">
        <button type="button"
          class="px-4 py-2 text-sm text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors">
          Cancel
        </button>
        <button type="submit"
          class="px-5 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
          Create task
        </button>
      </div>
    </form>
  </div>
</div>
