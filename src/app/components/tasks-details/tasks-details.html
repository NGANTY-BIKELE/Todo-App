<form>
  <div class="flex items-center justify-center p-4">
    <div class="bg-white rounded-lg border border-gray-100 w-full max-w-3xl overflow-hidden">

      <!-- Header -->
      <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
        <button type="button" [routerLink]="['/my-tasks']"
          class="flex items-center gap-1.5 text-sm text-gray-800 hover:text-gray-800 transition-colors">
          <svg lucideArrowLeft [size]="16"></svg>
          My tasks
        </button>
        <span class="text-xs font-medium text-blue-600 bg-blue-50 px-3 py-1 rounded-full">
          Task ID #{{ (task$ | async)?.id }}
        </span>
      </div>

      <div class="flex">
        <!-- Main content -->
        <div class="flex-1 p-6 space-y-5">
          <h2 class="text-xl font-medium text-gray-900 leading-snug">
            {{ (task$ | async)?.title }}
          </h2>
          <div>
            <p class="text-xs font-semibold text-gray-900 uppercase tracking-wider mb-2">Description</p>
            <div class="bg-gray-50 rounded-lg p-4">
              <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">
                {{ (task$ | async)?.description }}
              </p>
            </div>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="w-56 flex-shrink-0 border-l border-gray-100 p-6 flex flex-col gap-5">
          <div>
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Statut</p>
            <select
              class="w-full outline-none text-sm text-gray-900 bg-white border border-gray-200 rounded px-3 py-1.5 cursor-pointer focus:ring-1 focus:ring-blue-200 focus:border-blue-200 transition-colors">
              <option value="To do">To do</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </div>
          <div>
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Priority</p>
            <select
              class="w-full outline-nonetext-sm text-gray-900 bg-white border border-gray-200 rounded px-3 py-1.5 cursor-pointer focus:ring-1 focus:ring-blue-100 focus:border-blue-200 transition-colors">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>

          <div class="border-t border-gray-100 pt-5 space-y-4">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Date</p>
            <div>
              <p class="text-xs text-gray-400 mb-1">Start Date</p>
              <div class="flex items-center gap-1.5">
                <svg lucideCalendar [size]="14" class="text-green-400"></svg>
                <span class="text-sm font-medium text-gray-800">{{ (task$ | async)?.startDate }}</span>
              </div>
            </div>
            <div>
              <p class="text-xs text-gray-400 mb-1">End Date</p>
              <div class="flex items-center gap-1.5">
                <svg lucideCalendar [size]="14" class="text-red-400"></svg>
                <span class="text-sm font-medium text-gray-800">{{ (task$ | async)?.endDate }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-2">
        <button
          type="button"
          [routerLink]="['/my-tasks']"
          class="text-sm text-gray-500 border border-gray-200 rounded-lg px-4 py-1.5 hover:bg-gray-50 transition-colors">
          Cancel
        </button>
        <button
          type="submit"
          class="text-sm font-medium text-blue-600 bg-blue-50 rounded-lg px-4 py-1.5 hover:bg-blue-100 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          Save
        </button>
      </div>

    </div>
  </div>
</form>
<!-- (ngSubmit)="saveTask()" #taskForm="ngForm" [disabled]="taskForm.invalid" -->
