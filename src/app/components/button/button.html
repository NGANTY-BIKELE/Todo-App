<button
  [type]="type"
  (click)="onClick()"
  [disabled]="disabled"
  class="flex items-center justify-center gap-2 text-xs font-medium px-4 py-2 transition-all cursor-pointer rounded w-fit border-none"
  [ngClass]="{
    'bg-[#1e3a6e] text-white hover:bg-[#162d57]': variant === 'primary' && !disabled,
    'bg-white text-[#1e3a6e] border border-[#1e3a6e] hover:bg-gray-50': variant === 'secondary' && !disabled,
    'bg-red-50 text-red-500 hover:bg-red-100': variant === 'danger' && !disabled,
    'bg-gray-200 text-gray-500 cursor-not-allowed opacity-70': disabled
  }">
  <ng-content></ng-content>
  @if (label) {
    <span>{{ label }}</span>
  }
</button>
