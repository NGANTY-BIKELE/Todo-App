<div class="flex h-screen overflow-hidden">
  <aside class="w-80 bg-[#1e3a6e] flex flex-col shrink-0 shadow-xl z-20">
    <div class="h-20 flex items-center px-8 border-b border-blue-900/30">
      <span class="text-lg font-bold tracking-wide text-white uppercase">Tasks Manager</span>
    </div>

    <nav class="flex flex-col gap-2 p-6">
      <a routerLink="/dashboard" routerLinkActive="bg-white/10 text-white font-semibold"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-blue-100/70 font-medium hover:bg-white/5 hover:text-white transition-all">
        <svg lucideLayoutDashboard [size]="18"></svg>
        Dashboard
      </a>
      <a routerLink="/my-tasks" routerLinkActive="bg-white/10 text-white font-semibold"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-blue-100/70 font-medium hover:bg-white/5 hover:text-white transition-all">
        <svg lucideListTodo [size]="18"></svg>
        My Tasks
      </a>
      <a routerLink="/completed" routerLinkActive="bg-white/10 text-white font-semibold"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-blue-100/70 font-medium hover:bg-white/5 hover:text-white transition-all">
        <svg lucideCheckCircle [size]="18"></svg>
        Completed
      </a>
      <a routerLink="/setting" routerLinkActive="bg-white/10 text-white font-semibold"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-blue-100/70 font-medium hover:bg-white/5 hover:text-white transition-all">
        <svg lucideSettings [size]="18"></svg>
        Settings
      </a>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden">
    <app-header></app-header>
    <main class="flex-1 overflow-y-auto bg-slate-50 p-10 flex flex-col">
      <router-outlet />
    </main>
  </div>
</div>
